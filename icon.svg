<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b54" />
      <stop offset="100%" stop-color="#ffb26b" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#7c2d12" flood-opacity="0.15" />
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="230" fill="url(#bgGrad)" />
  
  <!-- Dog Group (centered and filtered) -->
  <g filter="url(#shadow)" transform="translate(0, 10)">
    <!-- Ears -->
    <!-- Left Ear -->
    <path d="M150 170 L210 240 L130 260 Z" fill="#e76f51" />
    <path d="M160 185 L200 235 L145 250 Z" fill="#ffccd5" />
    
    <!-- Right Ear -->
    <path d="M362 170 L382 260 L302 240 Z" fill="#e76f51" />
    <path d="M352 185 L367 250 L312 235 Z" fill="#ffccd5" />
    
    <!-- Head Base -->
    <ellipse cx="256" cy="280" rx="140" ry="110" fill="#f4a261" />
    
    <!-- Cheeks (white areas) -->
    <ellipse cx="176" cy="300" rx="60" ry="70" fill="#ffffff" />
    <ellipse cx="336" cy="300" rx="60" ry="70" fill="#ffffff" />
    
    <!-- Eyebrows (fluffy details) -->
    <ellipse cx="196" cy="210" rx="20" ry="12" fill="#ffffff" />
    <ellipse cx="316" cy="210" rx="20" ry="12" fill="#ffffff" />
    
    <!-- Eyes -->
    <circle cx="186" cy="246" r="14" fill="#264653" />
    <circle cx="182" cy="242" r="5" fill="#ffffff" />
    
    <!-- Eye highlights -->
    <circle cx="326" cy="246" r="14" fill="#264653" />
    <circle cx="322" cy="242" r="5" fill="#ffffff" />
    
    <!-- Snout (white circle center) -->
    <ellipse cx="256" cy="295" rx="55" ry="40" fill="#ffffff" />
    
    <!-- Nose -->
    <path d="M236 280 C236 280 236 295 256 295 C276 295 276 280 276 280 C276 270 236 270 236 280 Z" fill="#264653" />
    
    <!-- Mouth -->
    <path d="M238 300 C246 306 256 306 256 306 C256 306 266 306 274 300" stroke="#264653" stroke-width="4" stroke-linecap="round" fill="none" />
    
    <!-- Cute blush -->
    <ellipse cx="140" cy="290" rx="15" ry="8" fill="#ffb5a7" opacity="0.6" />
    <ellipse cx="372" cy="290" rx="15" ry="8" fill="#ffb5a7" opacity="0.6" />
  </g>
</svg>
